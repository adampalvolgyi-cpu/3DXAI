<!-- 
  Version: 2.3
  Changelog:
  - Removed Target 1 to prevent array-out-of-bounds rendering crashes with single-target files.
  - Preserved MindAR intrinsic physics scale during decoupling to prevent warping.
  - Delayed look-controls boot natively post-permissions to ensure valid DeviceOrientation parsing (fixing the screen freeze).
  - Version 2.4: Added EN/HU localization toggle tracking global configuration state from localStorage.
  - Version 2.5: Aligned language button, flipped EN/HU label logic, set default lang via navigator.
-->
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>AI_X Alternate AR</title>

  <style>
    body,
    html {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background-color: transparent;
      font-family: sans-serif;
      width: 100%;
      height: 100%;
    }

    #back-btn {
      position: absolute;
      top: 20px;
      left: 20px;
      padding: 10px 15px;
      background-color: rgba(255, 255, 255, 0.2);
      color: #fff;
      border: 1px solid #fff;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      font-size: 14px;
      z-index: 1000;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #lang-btn {
      position: absolute;
      top: 25px;
      right: 20px;
      padding: 10px 15px;
      background-color: rgba(255, 255, 255, 0.2);
      color: #fff;
      border: 1px solid #fff;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      font-size: 14px;
      z-index: 1000;
      transition: background 0.2s;
    }
    #lang-btn:active {
      background: rgba(255, 255, 255, 0.4);
    }

    #tap-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #111;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: sans-serif;
      font-size: 20px;
      z-index: 9999;
      cursor: pointer;
    }
  </style>

  <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

  <script>
    AFRAME.registerComponent('imu-fallback', {
      init: function () {
        this.targetEl = this.el.parentNode; // The mindar-image-target
        this.sceneEl = document.querySelector('a-scene');

        this.gyroTracker = null;

        this.isLost = false;
        this.baselineGyroInverse = new THREE.Quaternion();
        this.baselineTargetPos = new THREE.Vector3();
        this.baselineTargetRot = new THREE.Quaternion();

        this.targetEl.addEventListener('targetFound', () => {
          this.isLost = false;

          if (this.el.object3D.parent !== this.targetEl.object3D) {
            this.targetEl.object3D.add(this.el.object3D);
            this.el.object3D.position.set(0, 0, 0);
            this.el.object3D.quaternion.identity();
            this.el.object3D.scale.set(1, 1, 1);
          }
        });

        this.targetEl.addEventListener('targetLost', () => {
          this.isLost = true;

          this.targetEl.object3D.updateWorldMatrix(true, false);
          this.baselineTargetPos.setFromMatrixPosition(this.targetEl.object3D.matrixWorld);
          this.baselineTargetRot.setFromRotationMatrix(this.targetEl.object3D.matrixWorld);

          let worldScale = new THREE.Vector3();
          this.targetEl.object3D.getWorldScale(worldScale);
          this.el.object3D.scale.copy(worldScale);

          if (!this.gyroTracker) {
            let g = document.getElementById('gyro-tracker');
            if (g) this.gyroTracker = g.object3D;
          }

          let currentGyro = new THREE.Quaternion();
          if (this.gyroTracker) {
            this.gyroTracker.getWorldQuaternion(currentGyro);
          }
          this.baselineGyroInverse.copy(currentGyro).invert();

          this.sceneEl.object3D.add(this.el.object3D);
          this.el.object3D.visible = true;
        });
      },

      tick: function () {
        if (this.isLost && this.el.object3D.parent === this.sceneEl.object3D) {
          if (!this.gyroTracker) return;

          let currentGyro = new THREE.Quaternion();
          this.gyroTracker.getWorldQuaternion(currentGyro);

          let currentGyroInv = currentGyro.clone().invert();
          let baselineGyro = this.baselineGyroInverse.clone().invert();

          let inverseDeltaQ = baselineGyro.clone().multiply(currentGyroInv);

          let newPos = this.baselineTargetPos.clone().applyQuaternion(inverseDeltaQ);
          this.el.object3D.position.copy(newPos);

          let newRot = inverseDeltaQ.clone().multiply(this.baselineTargetRot);
          this.el.object3D.quaternion.copy(newRot);
        }
      }
    });

    document.addEventListener('DOMContentLoaded', () => {
      const urlParams = new URLSearchParams(window.location.search);
      const projectId = urlParams.get('p') || 1;
      document.getElementById('back-btn').href = `index.html?p=${projectId}`;

      // 1) Dynamically link the target asset model natively
      const assets = document.getElementById('scene-assets');
      assets.insertAdjacentHTML('beforeend', `<a-asset-item id="project-model" src="models/project${projectId}.glb"></a-asset-item>`);

      // 2) Dynamically spawn Exhibition Containers into Hardcoded Targets
      const target0 = document.getElementById('target0');
      target0.insertAdjacentHTML('beforeend', `
        <a-entity class="exhibition-container" imu-fallback>
          <a-entity gltf-model="#project-model" position="0 0 0" rotation="0 0 0"></a-entity>
        </a-entity>
      `);

      const overlay = document.getElementById('tap-overlay');
      const langBtn = document.getElementById('lang-btn');
      const backBtnText = document.getElementById('back-btn-text');

      let currentLang = localStorage.getItem('appLang');
      if (!currentLang) {
        currentLang = navigator.language.toLowerCase().startsWith('hu') ? 'hu' : 'en';
      }
      const fDict = {
        'en': {
          'tap': 'Tap anywhere to begin AR',
          'exit': 'Exit Alternate AR'
        },
        'hu': {
          'tap': 'Koppints bárhova az AR elindításához',
          'exit': 'Kilépés az alternatív AR-ből'
        }
      };

      function updateFLang() {
        langBtn.innerText = currentLang === 'en' ? 'HU' : 'EN';
        // Check if overlay is already removed via display: none
        if (overlay.style.display !== 'none') {
          overlay.innerText = fDict[currentLang].tap;
        }
        backBtnText.innerText = fDict[currentLang].exit;
      }

      langBtn.addEventListener('click', () => {
        currentLang = currentLang === 'en' ? 'hu' : 'en';
        localStorage.setItem('appLang', currentLang);
        updateFLang();
      });

      updateFLang();

      const attemptPermit = async () => {
        if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
          try {
            await DeviceOrientationEvent.requestPermission();
          } catch (e) {
            console.warn("Gyro permission denied or failed.");
          }
        }
        overlay.style.display = 'none';

        // Ensure robust gyro tracking loads logically after permission phase
        let gyro = document.createElement('a-entity');
        gyro.setAttribute('id', 'gyro-tracker');
        gyro.setAttribute('look-controls', 'magicWindowTrackingEnabled: true');
        document.querySelector('a-scene').appendChild(gyro);

        overlay.removeEventListener('click', attemptPermit);
        overlay.removeEventListener('touchstart', attemptPermit);
      };

      overlay.addEventListener('click', attemptPermit);
      overlay.addEventListener('touchstart', attemptPermit);
    });
  </script>
</head>

<body>
  <div id="tap-overlay">Tap anywhere to begin AR</div>
  <button id="lang-btn">EN</button>

  <a id="back-btn" href="#">
    <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
      <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z" />
    </svg>
    <span id="back-btn-text">Exit Alternate AR</span>
  </a>

  <!-- Hardcoded Engine ensuring WebRTC Hardware Access loads immediately -->
  <a-scene mindar-image="imageTargetSrc: exhibition.mind;" color-space="sRGB"
    renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">

    <a-assets id="scene-assets"></a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0" id="target0"></a-entity>

  </a-scene>

</body>

</html>
