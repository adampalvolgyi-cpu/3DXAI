<!-- 
  Version: 1.0 - Initial Alternative AR Implementation
  Changelog:
  - Created standalone A-Frame and AR.js WebAR interface.
  - Implemented DeviceOrientation and DeviceMotion permission overlay for iOS 13+ devices.
  - Initialized `<a-scene>` with AR.js configuration for 3x3 mono_and_matrix ArUco/Barcode detection.
  - Appended custom `extended-tracking` component to hook into Three.js `scene.object3D.attach()`.
  - Added URL parameter parsing to dynamically append the `value=p` attribute to `<a-marker>`.
  - Added Back button routing to `index.html`.
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>AI_X Alternate AR</title>
  
  <style>
    body, html { margin: 0; padding: 0; overflow: hidden; background-color: #000; font-family: sans-serif; }
    
    #ios-overlay {
      position: absolute; inset: 0; background: rgba(0, 0, 0, 0.95);
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      z-index: 9999; color: white; text-align: center; padding: 20px; box-sizing: border-box;
    }
    #ios-overlay h1 { margin-top: 0; font-size: 24px; }
    #ios-overlay p { margin-bottom: 30px; line-height: 1.5; color: #ccc; font-size: 14px; max-width: 300px; }
    #start-exhibition-btn {
      padding: 15px 30px; font-size: 16px; font-weight: bold; background-color: #fff; color: #000;
      border: none; border-radius: 8px; cursor: pointer;
    }

    #back-btn {
      position: absolute; top: 20px; left: 20px; padding: 10px 15px;
      background-color: rgba(255, 255, 255, 0.2); color: #fff; border: 1px solid #fff;
      border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 14px;
      z-index: 1000; text-decoration: none; display: flex; align-items: center; gap: 8px;
    }
  </style>

  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <script>
    // 3DOF Fallback Extended Tracking Component
    AFRAME.registerComponent('extended-tracking', {
      init: function () {
        this.modelEl = this.el.querySelector('.ar-model');
        this.worldGroup = this.el.sceneEl.object3D;

        this.el.addEventListener('markerFound', () => {
          if (this.modelEl && this.modelEl.object3D && this.el.object3D) {
            // Restore model back to the marker and zero out local transforms
            this.el.object3D.add(this.modelEl.object3D);
            this.modelEl.setAttribute('position', '0 0 0');
            this.modelEl.setAttribute('rotation', '0 0 0');
          }
        });

        this.el.addEventListener('markerLost', () => {
          if (this.modelEl && this.modelEl.object3D) {
            // Detach mathematically recalculates the matrix and parents to world space
            // This forces the model to freeze in physical 3DOF space relative to device gyro
            this.worldGroup.attach(this.modelEl.object3D);
          }
        });
      }
    });

    document.addEventListener('DOMContentLoaded', () => {
      const urlParams = new URLSearchParams(window.location.search);
      const projectId = urlParams.get('p') || 1;
      
      document.getElementById('back-btn').href = `index.html?p=${projectId}`;

      // Dynamically load marker value and project model
      const marker = document.getElementById('barcode-marker');
      marker.setAttribute('value', projectId);

      const modelEntity = document.createElement('a-entity');
      modelEntity.setAttribute('gltf-model', `url(models/project${projectId}.glb)`);
      modelEntity.setAttribute('class', 'ar-model');
      marker.appendChild(modelEntity);
    });
  </script>
</head>
<body>
  
  <div id="ios-overlay" style="display: none;">
    <h1>AR Sensor Setup</h1>
    <p>Please grant device motion permissions to stabilize the 3D model and enable the 3DOF Gyro fallback tracking when the marker is lost.</p>
    <button id="start-exhibition-btn">Request Access</button>
  </div>

  <a id="back-btn" href="index.html">
    <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
      <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
    </svg>
    Exit Alternate AR
  </a>

  <a-scene 
    embedded 
    arjs="sourceType: webcam; detectionMode: mono_and_matrix; matrixCodeType: 3x3;"
    renderer="logarithmicDepthBuffer: true;"
    vr-mode-ui="enabled: false">
    
    <!-- Camera component required for device IMU tracking baseline -->
    <a-camera position="0 0 0" look-controls></a-camera>
    
    <a-marker type="barcode" id="barcode-marker" extended-tracking></a-marker>
  </a-scene>

  <script>
    // iOS 13+ strict DeviceMotion permission protocol
    const iosOverlay = document.getElementById('ios-overlay');
    const startBtn = document.getElementById('start-exhibition-btn');
    
    // Check if device supports the API block
    const requiresPermission = typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function';

    if (requiresPermission) {
      iosOverlay.style.display = 'flex';
      
      startBtn.addEventListener('click', () => {
        DeviceMotionEvent.requestPermission()
          .then(permissionState => {
            if (permissionState === 'granted') {
              if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission();
              }
              iosOverlay.style.display = 'none';
            } else {
              iosOverlay.innerHTML = `<h1>Access Denied</h1><p>Restart the browser and allow sensors for AR tracking.</p>`;
            }
          })
          .catch(console.error);
      });
    }
  </script>
</body>
</html>
