<!-- 
  Version: 2.0
  Changelog:
  - Switched detection engine to MindAR for neural-net image tracking.
  - Implemented dual-marker target setup matching `exhibition.mind`.
  - Added tap-to-start iOS permission overlay logic natively bypassing blockers.
  - Added custom `imu-fallback` quaternion orbital logic for target-loss 3DoF stability.
-->
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>AI_X Alternate AR</title>

  <style>
    body,
    html {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background-color: #111;
      font-family: sans-serif;
      width: 100%;
      height: 100%;
    }

    #back-btn {
      position: absolute;
      top: 20px;
      left: 20px;
      padding: 10px 15px;
      background-color: rgba(255, 255, 255, 0.2);
      color: #fff;
      border: 1px solid #fff;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      font-size: 14px;
      z-index: 1000;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #tap-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #111;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: sans-serif;
      font-size: 20px;
      z-index: 9999;
      cursor: pointer;
    }
  </style>

  <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

  <script>
    AFRAME.registerComponent('imu-fallback', {
      init: function () {
        this.targetEl = this.el.parentNode; // The mindar-image-target
        this.sceneEl = document.querySelector('a-scene');

        let gyro = document.getElementById('gyro-tracker');
        if (!gyro) {
          gyro = document.createElement('a-entity');
          gyro.setAttribute('id', 'gyro-tracker');
          gyro.setAttribute('look-controls', 'magicWindowTrackingEnabled: true');
          this.sceneEl.appendChild(gyro);
        }
        this.gyroTracker = gyro.object3D;

        this.isLost = false;
        this.baselineGyroInverse = new THREE.Quaternion();
        this.baselineTargetPos = new THREE.Vector3();
        this.baselineTargetRot = new THREE.Quaternion();

        this.targetEl.addEventListener('targetFound', () => {
          this.isLost = false;

          if (this.el.object3D.parent !== this.targetEl.object3D) {
            this.targetEl.object3D.add(this.el.object3D);
            this.el.object3D.position.set(0, 0, 0);
            this.el.object3D.quaternion.identity();
            this.el.object3D.scale.set(1, 1, 1);
          }
        });

        this.targetEl.addEventListener('targetLost', () => {
          this.isLost = true;

          this.targetEl.object3D.updateWorldMatrix(true, false);
          this.baselineTargetPos.setFromMatrixPosition(this.targetEl.object3D.matrixWorld);
          this.baselineTargetRot.setFromRotationMatrix(this.targetEl.object3D.matrixWorld);

          let currentGyro = new THREE.Quaternion();
          this.gyroTracker.getWorldQuaternion(currentGyro);
          this.baselineGyroInverse.copy(currentGyro).invert();

          this.sceneEl.object3D.add(this.el.object3D);
          this.el.object3D.visible = true;
        });
      },

      tick: function () {
        if (this.isLost && this.el.object3D.parent === this.sceneEl.object3D) {
          let currentGyro = new THREE.Quaternion();
          this.gyroTracker.getWorldQuaternion(currentGyro);

          let currentGyroInv = currentGyro.clone().invert();
          let baselineGyro = this.baselineGyroInverse.clone().invert();
          let inverseDeltaQ = currentGyroInv.multiply(baselineGyro);

          let newPos = this.baselineTargetPos.clone().applyQuaternion(inverseDeltaQ);
          this.el.object3D.position.copy(newPos);

          let newRot = inverseDeltaQ.clone().multiply(this.baselineTargetRot);
          this.el.object3D.quaternion.copy(newRot);
        }
      }
    });

    document.addEventListener('DOMContentLoaded', () => {
      const urlParams = new URLSearchParams(window.location.search);
      const projectId = urlParams.get('p') || 1;

      document.getElementById('back-btn').href = `index.html?p=${projectId}`;

      const overlay = document.getElementById('tap-overlay');

      const startAR = () => {
        overlay.style.display = 'none';

        const sceneHTML = `
          <a-scene mindar-image="imageTargetSrc: exhibition.mind;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
            
            <a-assets>
               <a-asset-item id="project-model" src="models/project${projectId}.glb"></a-asset-item>
            </a-assets>

            <a-camera position="0 0 0" look-controls="enabled: false"></a-camera> 

            <!-- Target 0 : Floor -->
            <a-entity mindar-image-target="targetIndex: 0">
               <a-entity class="exhibition-container" imu-fallback>
                  <a-entity gltf-model="#project-model" position="0 0 0" rotation="0 0 0"></a-entity>
               </a-entity>
            </a-entity>
            
            <!-- Target 1 : Wall Setup -->
            <a-entity mindar-image-target="targetIndex: 1">
               <a-entity class="exhibition-container" imu-fallback>
                  <a-entity gltf-model="#project-model" position="0 -1 3" rotation="-90 0 0"></a-entity>
               </a-entity>
            </a-entity>

          </a-scene>
        `;
        document.body.insertAdjacentHTML('beforeend', sceneHTML);
      };

      const attemptPermit = async () => {
        if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
          try {
            const permit = await DeviceOrientationEvent.requestPermission();
            if (permit === 'granted') {
              startAR();
            } else {
              alert('Gyroscope permission denied. 3DoF orientation tracking will not work.');
              startAR();
            }
          } catch (e) {
            startAR();
          }
        } else {
          startAR();
        }

        overlay.removeEventListener('click', attemptPermit);
        overlay.removeEventListener('touchstart', attemptPermit);
      };

      overlay.addEventListener('click', attemptPermit);
      overlay.addEventListener('touchstart', attemptPermit);
    });
  </script>
</head>

<body>
  <div id="tap-overlay">Tap anywhere to begin AR</div>

  <a id="back-btn" href="#">
    <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
      <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z" />
    </svg>
    Exit Alternate AR
  </a>
</body>

</html>
