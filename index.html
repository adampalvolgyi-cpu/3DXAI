<!-- 
  Version History:
  Version: 1.0 - Initial setup with DOM Overlay, state segregation, and synthetic click hit-testing.
  Version: 1.1 - Removed interaction blocker to re-enable native WebXR touch gestures.
  Version: 1.2 - Added persistent version display element to the DOM.
  Version: 1.3 - Fixed Exit AR pointer blocking, added bounds="tight", implemented 0.0001 scale pre-hiding.
  Version: 1.4 - Fixed premature UI teardown by isolating teardown logic exclusively to 'not-presenting' state.
  Version: 1.5 - Reverted to auto-anchoring, removed manual placement buttons, added auto-hide logic for ghost anchor.
  Version: 1.6 - Shrunk ghost image by 20%, added ios-src attribute for native Apple RealityKit image tracking fallback.
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Digital Art Exhibition AR</title>
  <style>
    /* Reset and ensure full screen */
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #111;
    }

    model-viewer {
      width: 100%;
      height: 100%;
    }

    /* Standard HTML Button to launch AR */
    #ar-button {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      background-color: #fff;
      color: #000;
      padding: 15px 30px;
      font-size: 18px;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      z-index: 100;
    }

    /* Custom AR UI Overlay Container */
    #ar-ui-container {
      display: none; /* Hidden outside of AR */
      position: absolute;
      inset: 0;
      z-index: 1000;
      pointer-events: none; /* CRITICAL: Allows touches to pass through to the Exit AR button */
    }

    /* UI Elements */
    .ar-ui-layer {
      position: absolute;
      inset: 0;
      z-index: 20;
      pointer-events: none; /* Let touches pass through to buttons or model-viewer */
    }

    /* Calibration State UI */
    #instructions {
      position: absolute;
      top: 30px;
      width: 100%;
      text-align: center;
      color: white;
      font-family: sans-serif;
      font-size: 16px;
      line-height: 1.5;
      text-shadow: 1px 1px 4px rgba(0,0,0,0.8);
      pointer-events: none;
    }

    #ghost-image {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      /* Reduced size by 20% to expose more physical wall area for camera tracking */
      width: 48vw; 
      max-width: 240px;
      opacity: 0.25;
      border: 2px dashed #fff;
      pointer-events: none;
    }

    /* Version Display */
    #version-display {
      position: absolute;
      top: 15px;
      left: 15px;
      color: rgba(255, 255, 255, 0.5);
      font-family: sans-serif;
      font-size: 14px;
      z-index: 9999;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <!-- 
    bounds="tight": Explicitly matches geometry to reduce invisible offset gaps.
    ar-scale="fixed": Forces strict 1:1 scale rendering (disables pinch-to-zoom).
    ios-src: Automatically routes iOS users to AR Quick Look using RealityKit.
  -->
  <model-viewer
    id="exhibition-viewer"
    src="models/project1.glb"
    ios-src="models/project1.reality"
    bounds="tight"
    ar
    ar-placement="wall"
    ar-scale="fixed"
    camera-controls
    alt="Digital Art 3D Model">

    <!-- Version Marker -->
    <div id="version-display">v1.6</div>

    <!-- AR Launch Button -->
    <button slot="ar-button" id="ar-button">Open in AR</button>

    <!-- Custom AR DOM Overlay (Android WebXR only, ignored by iOS Quick Look) -->
    <div id="ar-ui-container">
      <div id="calibration-state" class="ar-ui-layer">
        <div id="instructions">
          1. Scan the wall until the model appears.<br>
          2. Drag the model to align it with the poster.<br>
          (Push model backward if it looks too large)
        </div>
        <img id="ghost-image" src="anchor.jpg" alt="Ghost Anchor">
      </div>
    </div>

  </model-viewer>

  <!-- Import latest model-viewer -->
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>

  <script>
    const viewer = document.getElementById('exhibition-viewer');
    const arUiContainer = document.getElementById('ar-ui-container');
    const ghostImage = document.getElementById('ghost-image');
    const instructions = document.getElementById('instructions');
    
    let ghostTimeout;

    // Toggle AR UI visibility based on WebXR session status (Android only)
    viewer.addEventListener('ar-status', (event) => {
      if (event.detail.status === 'not-presenting') {
        // Exited AR: Safely hide the custom UI and clear any pending timeouts
        arUiContainer.style.display = 'none';
        clearTimeout(ghostTimeout);
      } else if (event.detail.status === 'session-started') {
        // Entered AR: Show the custom UI to guide scanning
        arUiContainer.style.display = 'block';
        ghostImage.style.display = 'block';
        instructions.style.display = 'block';
        
        // Failsafe: Hide ghost image and instructions after 10 seconds if tracking fails
        ghostTimeout = setTimeout(() => {
          ghostImage.style.display = 'none';
          instructions.style.display = 'none';
        }, 10000);
      } else if (event.detail.status === 'object-placed') {
        // AR Scene is Tracked: Wall found, model auto-anchored. Hide calibration UI.
        ghostImage.style.display = 'none';
        instructions.style.display = 'none';
        clearTimeout(ghostTimeout);
      }
    });
  </script>
</body>
</html>
