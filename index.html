<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR Digital Exhibition</title>
    
    <!-- Import Google's <model-viewer> library -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: #111;
            font-family: sans-serif;
            overflow: hidden;
        }

        model-viewer {
            width: 100%;
            height: 100%;
            /* Hide the default loading poster to keep it clean */
            --poster-color: transparent; 
        }

        /* 1. Custom 'Open in AR' Button */
        #custom-ar-button {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            background-color: #007bff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            z-index: 10;
        }

        #custom-ar-button:active {
            background-color: #0056b3;
        }

        /* 2. The Ghost UI Overlay (Hidden until AR opens) */
        #ghost-ui {
            display: none; /* Toggled on by JavaScript when AR starts */
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* Crucial: lets the user's tap pass THROUGH the ghost image to place the model */
            pointer-events: none; 
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 5;
        }

        /* 3. The 25% Transparent Anchor Image */
        #ghost-image {
            width: 60vw;
            max-width: 300px;
            opacity: 0.25;
            /* Added a subtle dashed border to help them aim */
            border: 2px dashed rgba(255, 255, 255, 0.6); 
            border-radius: 4px;
        }

        /* 4. Instructions Text */
        #instructions {
            position: absolute;
            top: 10%;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 15px 20px;
            border-radius: 8px;
            text-align: center;
            font-size: 16px;
            width: 80%;
            max-width: 350px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <!-- 
      ar-placement="wall" : Tells the AR engine to map vertical walls, not the floor.
      ar-scale="fixed" : Locks the model at exactly 1:1 scale (the size you modeled it).
      disable-zoom / disable-pan : Disables user touch gestures so they can't shrink/move the artwork.
    -->
    <model-viewer 
        id="exhibition-model"
        src="models/project1.glb"
        ar 
        ar-modes="webxr scene-viewer quick-look" 
        ar-placement="wall" 
        ar-scale="fixed"
        disable-zoom
        disable-pan
        shadow-intensity="1"
        camera-controls>
        
        <!-- Slotting our custom button overrides the default <model-viewer> button -->
        <button slot="ar-button" id="custom-ar-button">
            Open in AR
        </button>

        <!-- Our custom DOM Overlay that renders on top of the camera feed in WebXR -->
        <div id="ghost-ui">
            <div id="instructions">Align this image over the poster on the wall, then tap the screen.</div>
            <img id="ghost-image" src="anchor.jpg" alt="Ghost Anchor">
        </div>

    </model-viewer>

    <script>
        const modelViewer = document.getElementById('exhibition-model');
        const ghostUI = document.getElementById('ghost-ui');
        const ghostImage = document.getElementById('ghost-image');
        const instructions = document.getElementById('instructions');
        
        let isPlaced = false;

        // 1. Listen for when the AR camera actually opens
        modelViewer.addEventListener('ar-status', (event) => {
            if (event.detail.status === 'session-started') {
                // AR has started! Turn on the ghost image overlay.
                ghostUI.style.display = 'flex';
                ghostImage.style.display = 'block'; // Reset in case they re-enter AR
                instructions.innerText = "Align this image over the poster on the wall, then tap the screen.";
                instructions.style.opacity = "1";
                isPlaced = false;
            } else if (event.detail.status === 'not-presenting') {
                // User closed AR. Hide the overlay.
                ghostUI.style.display = 'none';
            }
        });

        // 2. Listen for the user's tap on the screen
        modelViewer.addEventListener('pointerdown', (event) => {
            // Check if we are currently inside the active AR view
            if (modelViewer.hasAttribute('ar-status') && 
                modelViewer.getAttribute('ar-status') !== 'not-presenting' && 
                !isPlaced) {
                
                // The model has now been placed!
                isPlaced = true;
                
                // Instantly hide the ghost image so they can see the artwork
                ghostImage.style.display = 'none';
                
                // Update the text to confirm placement
                instructions.innerText = "Artwork Placed! You can now walk around.";
                
                // Automatically fade out the text box after 3 seconds for a clean museum view
                setTimeout(() => {
                    instructions.style.transition = "opacity 1s ease-in-out";
                    instructions.style.opacity = "0";
                }, 3000);
            }
        });
    </script>

</body>
</html>
