<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR Digital Exhibition</title>
    
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
    
    <style>
        body, html {
            margin: 0; padding: 0; width: 100vw; height: 100vh;
            background-color: #111; font-family: sans-serif; overflow: hidden;
        }

        model-viewer {
            width: 100%; height: 100%;
            --poster-color: transparent; 
        }

        #custom-ar-button {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            padding: 15px 30px; font-size: 18px; font-weight: bold;
            color: white; background-color: #007bff; border: none; border-radius: 8px;
            cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.3); z-index: 10;
        }

        /* The Main AR UI Overlay */
        #ar-ui-overlay {
            display: none; /* Hidden until AR opens */
            position: absolute; inset: 0;
            pointer-events: none; /* Container lets taps pass through */
            z-index: 5;
            flex-direction: column; justify-content: center; align-items: center;
        }

        /* Top Left Retry Button */
        #retry-btn {
            position: absolute; top: 20px; left: 20px; z-index: 10;
            background-color: rgba(0, 0, 0, 0.7); color: white; border: 1px solid white;
            padding: 10px 15px; border-radius: 8px; font-size: 16px; font-weight: bold;
            cursor: pointer; display: none; /* Hidden initially */
            pointer-events: auto; /* Makes it tappable */
        }

        /* The Ghost Image Guide */
        #ghost-image {
            width: 60vw; max-width: 300px; aspect-ratio: 1 / 1; object-fit: contain;
            opacity: 0.25; border: 2px dashed rgba(255, 255, 255, 0.6); border-radius: 4px;
            pointer-events: none;
        }

        /* The Big "Place" Button */
        #place-btn {
            position: absolute; bottom: 50px; z-index: 10;
            background-color: #28a745; color: white;
            padding: 20px 40px; font-size: 22px; font-weight: bold;
            border-radius: 50px; text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); border: 2px solid white;
            pointer-events: auto; /* Makes it tappable */
            cursor: pointer;
        }

        /* Instructions Text Box */
        #instructions {
            position: absolute; top: 10%; background: rgba(0, 0, 0, 0.8);
            color: white; padding: 15px 20px; border-radius: 8px;
            text-align: center; font-size: 16px; width: 85%; max-width: 350px;
            line-height: 1.4; pointer-events: none;
        }
    </style>
</head>
<body>

    <!-- 
      No more scale hacks! The model runs pure natively.
      ar-placement="wall" forces it to look for vertical surfaces.
    -->
    <model-viewer 
        id="exhibition-model"
        src="models/project1.glb"
        ar 
        ar-modes="webxr scene-viewer quick-look" 
        ar-placement="wall" 
        ar-scale="fixed"
        disable-zoom
        disable-pan
        shadow-intensity="1">
        
        <button slot="ar-button" id="custom-ar-button">Open in AR</button>

        <!-- Our Custom AR UI Overlay -->
        <div id="ar-ui-overlay">
            
            <button id="retry-btn">↺ Retry Alignment</button>

            <div id="instructions">
                <strong>1. Scan the wall side-to-side</strong> until the white tracking circle appears.<br><br>
                <strong>2. Aim this ghost image</strong> over the real poster.<br><br>
                <strong>3. Tap the green button!</strong>
            </div>

            <img id="ghost-image" src="anchor.jpg" alt="Ghost Anchor">

            <button id="place-btn">Place the model</button>
            
        </div>

    </model-viewer>

    <script>
        const viewer = document.getElementById('exhibition-model');
        const arUiOverlay = document.getElementById('ar-ui-overlay');
        const ghostImage = document.getElementById('ghost-image');
        const placeBtn = document.getElementById('place-btn');
        const retryBtn = document.getElementById('retry-btn');
        const instructions = document.getElementById('instructions');
        
        let isPlaced = false;

        // UI Helper: Sets screen to "Aiming" Phase
        function setAimingMode() {
            isPlaced = false;
            placeBtn.style.display = 'block';
            retryBtn.style.display = 'none';
            ghostImage.style.display = 'block';
            instructions.innerHTML = "<strong>1. Scan the wall side-to-side</strong> until the white tracking circle appears.<br><br><strong>2. Aim this ghost image</strong> over the real poster.<br><br><strong>3. Tap the green button!</strong>";
            instructions.style.opacity = "1";
        }

        // UI Helper: Sets screen to "Locked" Phase
        function setLockedMode() {
            isPlaced = true;
            placeBtn.style.display = 'none';
            retryBtn.style.display = 'block';
            ghostImage.style.display = 'none';
            instructions.innerHTML = "<strong>Artwork Placed!</strong><br>You can now walk around the exhibition.";
            
            // Fade out instructions after 4 seconds
            setTimeout(() => {
                if (isPlaced) instructions.style.opacity = "0";
            }, 4000);
        }

        // 1. Detect when AR actually starts
        viewer.addEventListener('ar-status', (event) => {
            if (event.detail.status === 'session-started') {
                arUiOverlay.style.display = 'flex';
                setAimingMode();
            } else if (event.detail.status === 'not-presenting') {
                arUiOverlay.style.display = 'none';
            }
        });

        // 2. THE WEBXR MAGIC EVENT: This fires the millisecond a tap occurs in AR.
        viewer.addEventListener('beforexrselect', (ev) => {
            // If the model is ALREADY placed, we tell WebXR to cancel the tap.
            // This prevents the user from accidentally dragging/moving the artwork!
            if (isPlaced) {
                ev.preventDefault();
            }
            // If it is NOT placed yet, we do nothing. The tap passes directly to WebXR
            // and the native system beautifully snaps the artwork to the wall.
        });

        // 3. The Big Place Button
        placeBtn.addEventListener('click', () => {
            // Because we didn't block the `beforexrselect` event yet, the artwork 
            // is snapping to the wall behind the scenes exactly at this moment.
            setLockedMode();
        });

        // 4. The Retry Button
        retryBtn.addEventListener('click', () => {
            // Resets UI to aiming mode. The next time they press "Place", 
            // the model will instantly teleport from its old location to the new alignment.
            setAimingMode();
        });

    </script>

</body>
</html>
