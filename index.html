<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR Digital Exhibition</title>
    
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
    
    <style>
        body, html {
            margin: 0; padding: 0; width: 100vw; height: 100vh;
            background-color: #111; font-family: sans-serif; overflow: hidden;
        }

        model-viewer {
            width: 100%; height: 100%;
            --poster-color: transparent; 
        }

        /* 1. Initial Launch Button */
        #custom-ar-button {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            padding: 15px 30px; font-size: 18px; font-weight: bold;
            color: white; background-color: #007bff; border: none; border-radius: 8px;
            cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.3); z-index: 10;
        }
        #custom-ar-button:active { background-color: #0056b3; }

        /* 2. The Main AR UI Overlay */
        #ar-ui-overlay {
            display: none; /* Hidden until AR opens */
            position: absolute; inset: 0;
            pointer-events: none; /* Let taps fall through to the AR canvas by default */
            z-index: 5;
            flex-direction: column; justify-content: center; align-items: center;
        }

        /* 3. The Invisible Drag Shield */
        #drag-shield {
            position: absolute; inset: 0;
            pointer-events: none; /* Inactive initially */
            z-index: 1; /* Sits behind UI buttons */
        }
        #drag-shield.active {
            pointer-events: auto; /* Activates after placement to BLOCK model dragging */
        }

        /* 4. The Top-Left Retry Button */
        #retry-btn {
            position: absolute; top: 20px; left: 20px; z-index: 10;
            background-color: rgba(0, 0, 0, 0.6); color: white; border: none;
            padding: 10px 15px; border-radius: 8px; font-size: 16px; font-weight: bold;
            display: flex; align-items: center; gap: 8px; cursor: pointer;
            pointer-events: auto; /* This element must block taps to act as a button */
            display: none; /* Hidden initially */
        }
        #retry-btn:active { background-color: rgba(0, 0, 0, 0.9); }

        /* 5. The Ghost Image */
        #ghost-image {
            width: 60vw; max-width: 300px; aspect-ratio: 1 / 1; object-fit: contain;
            opacity: 0.25; border: 2px dashed rgba(255, 255, 255, 0.6); border-radius: 4px;
        }

        /* 6. The Big "Place" Button */
        #place-btn {
            position: absolute; bottom: 50px; z-index: 10;
            background-color: #28a745; color: white;
            padding: 20px 40px; font-size: 22px; font-weight: bold;
            border-radius: 50px; text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); border: 2px solid white;
            display: flex; justify-content: center; align-items: center;
            /* CRUCIAL: This makes the tap pass THROUGH the button into the AR tracking engine! */
            pointer-events: none; 
        }
    </style>
</head>
<body>

    <!-- 
      Model starts microscopic (0.001) so you can see the camera and the ghost image.
      ar-scale="fixed" guarantees 1:1 true scale once placed.
    -->
    <model-viewer 
        id="exhibition-model"
        src="models/project1.glb"
        ar 
        ar-modes="webxr scene-viewer quick-look" 
        ar-placement="wall" 
        ar-scale="fixed"
        scale="0.001 0.001 0.001" 
        disable-zoom
        disable-pan
        shadow-intensity="1">
        
        <button slot="ar-button" id="custom-ar-button">Open in AR</button>

        <!-- Our Custom AR UI Overlay -->
        <div id="ar-ui-overlay">
            
            <!-- The Invisible Drag Shield -->
            <div id="drag-shield"></div>

            <!-- Top Left Reposition / Retry Button -->
            <button id="retry-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6 0 1.01-.25 1.97-.7 2.8l1.46 1.46C19.54 15.03 20 13.57 20 12c0-4.42-3.58-8-8-8zm0 14c-3.31 0-6-2.69-6-6 0-1.01.25-1.97.7-2.8L5.24 7.74C4.46 8.97 4 10.43 4 12c0 4.42 3.58 8 8 8v3l4-4-4-4v3z"/></svg>
                Retry Alignment
            </button>

            <!-- The Transparent Anchor Guide -->
            <img id="ghost-image" src="anchor.jpg" alt="Ghost Anchor">

            <!-- The Big Placement Button -->
            <div id="place-btn">Place the model</div>
            
        </div>

    </model-viewer>

    <script>
        const modelViewer = document.getElementById('exhibition-model');
        const arUiOverlay = document.getElementById('ar-ui-overlay');
        const ghostImage = document.getElementById('ghost-image');
        const placeBtn = document.getElementById('place-btn');
        const retryBtn = document.getElementById('retry-btn');
        const dragShield = document.getElementById('drag-shield');
        
        let isPlaced = false;

        // Helper function to reset the UI back to "Aiming" mode
        function setUItoAimingMode() {
            isPlaced = false;
            modelViewer.setAttribute('scale', '0.001 0.001 0.001'); // Hide model
            ghostImage.style.display = 'block'; // Show alignment guide
            placeBtn.style.display = 'flex'; // Show Big Button
            retryBtn.style.display = 'none'; // Hide Retry Button
            dragShield.classList.remove('active'); // Turn off Drag Shield
        }

        // 1. Detect when AR actually starts
        modelViewer.addEventListener('ar-status', (event) => {
            if (event.detail.status === 'session-started') {
                arUiOverlay.style.display = 'flex'; // Reveal custom UI
                setUItoAimingMode();
            } else if (event.detail.status === 'not-presenting') {
                arUiOverlay.style.display = 'none'; // Clean up if they close AR
            }
        });

        // 2. The magic placement listener. 
        // Because the "Place" button has pointer-events: none, tapping it hits the canvas.
        modelViewer.addEventListener('pointerdown', (event) => {
            if (modelViewer.hasAttribute('ar-status') && 
                modelViewer.getAttribute('ar-status') !== 'not-presenting' && 
                !isPlaced) {
                
                isPlaced = true;
                
                // 50ms delay allows the native AR raycast to hit the wall before we switch everything
                setTimeout(() => {
                    modelViewer.setAttribute('scale', '1 1 1'); // Unhide and pop to full size
                    ghostImage.style.display = 'none'; // Hide alignment guide
                    placeBtn.style.display = 'none'; // Hide Big Button
                    retryBtn.style.display = 'flex'; // Reveal Top-Left Retry Button
                    dragShield.classList.add('active'); // TURN ON THE SHIELD (Locks the model)
                }, 50); 
            }
        });

        // 3. The Retry Button Logic
        retryBtn.addEventListener('click', (event) => {
            // Stop the click from accidentally placing the model immediately again
            event.stopPropagation(); 
            setUItoAimingMode();
        });
        
        // Also block pointerdown on the Retry Button so it doesn't trigger WebXR placement
        retryBtn.addEventListener('pointerdown', (event) => {
            event.stopPropagation();
        });

    </script>

</body>
</html>
