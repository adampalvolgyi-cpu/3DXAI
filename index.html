<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR Digital Exhibition</title>
    
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
    
    <style>
        body, html {
            margin: 0; padding: 0; width: 100vw; height: 100vh;
            background-color: #111; font-family: sans-serif; overflow: hidden;
        }

        model-viewer {
            width: 100%; height: 100%;
            --poster-color: transparent; 
        }

        #custom-ar-button {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            padding: 15px 30px; font-size: 18px; font-weight: bold;
            color: white; background-color: #007bff; border: none; border-radius: 8px;
            cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.3); z-index: 10;
        }

        #custom-ar-button:active { background-color: #0056b3; }

        /* The Ghost UI Overlay */
        #ghost-ui {
            display: none; 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            /* Let taps pass THROUGH initially so they can place the model */
            pointer-events: none; 
            flex-direction: column; justify-content: center; align-items: center;
            z-index: 5;
        }

        /* THE SHIELD: Activated via JavaScript after placement to block dragging */
        .shield-active {
            pointer-events: auto !important; 
        }

        #ghost-image {
            width: 60vw; max-width: 300px; opacity: 0.25;
            border: 2px dashed rgba(255, 255, 255, 0.6); border-radius: 4px;
        }

        #instructions {
            position: absolute; top: 10%; background: rgba(0, 0, 0, 0.7);
            color: white; padding: 15px 20px; border-radius: 8px;
            text-align: center; font-size: 16px; width: 80%; max-width: 350px;
        }
    </style>
</head>
<body>

    <!-- 
      scale="0.001 0.001 0.001" : This makes the model microscopic so it doesn't block the camera!
      We will change this to "1 1 1" via Javascript exactly when the user taps.
    -->
    <model-viewer 
        id="exhibition-model"
        src="models/project1.glb"
        ar 
        ar-modes="webxr scene-viewer quick-look" 
        ar-placement="wall" 
        ar-scale="fixed"
        scale="0.001 0.001 0.001" 
        disable-zoom
        disable-pan
        shadow-intensity="1">
        
        <button slot="ar-button" id="custom-ar-button">Open in AR</button>

        <div id="ghost-ui">
            <div id="instructions">Align this image over the poster on the wall, then tap the screen.</div>
            <img id="ghost-image" src="anchor.jpg" alt="Ghost Anchor">
        </div>

    </model-viewer>

    <script>
        const modelViewer = document.getElementById('exhibition-model');
        const ghostUI = document.getElementById('ghost-ui');
        const ghostImage = document.getElementById('ghost-image');
        const instructions = document.getElementById('instructions');
        
        let isPlaced = false;

        // 1. Reset everything when AR opens
        modelViewer.addEventListener('ar-status', (event) => {
            if (event.detail.status === 'session-started') {
                isPlaced = false;
                
                // Hide the model by making it microscopic
                modelViewer.setAttribute('scale', '0.001 0.001 0.001');
                
                // Show the ghost alignment UI
                ghostUI.style.display = 'flex';
                ghostImage.style.display = 'block';
                
                // Drop the shield so the first tap can go through
                ghostUI.classList.remove('shield-active'); 
                
                instructions.innerText = "Align this image over the poster on the wall, then tap the screen.";
                instructions.style.opacity = "1";
            } else if (event.detail.status === 'not-presenting') {
                ghostUI.style.display = 'none';
            }
        });

        // 2. Listen for the tap to place the model
        modelViewer.addEventListener('pointerdown', (event) => {
            if (modelViewer.hasAttribute('ar-status') && 
                modelViewer.getAttribute('ar-status') !== 'not-presenting' && 
                !isPlaced) {
                
                isPlaced = true;
                
                // Delay slightly to let the native WebXR raycast hit the wall first
                setTimeout(() => {
                    // Unhide the model (Scale it to true 1:1 size)
                    modelViewer.setAttribute('scale', '1 1 1');
                    
                    // Activate THE SHIELD to block all future touches (Disables Dragging)
                    ghostUI.classList.add('shield-active');
                    
                    // Hide the alignment ghost image
                    ghostImage.style.display = 'none';
                    
                    // Update Text
                    instructions.innerText = "Artwork Placed & Locked! You can now walk around.";
                    
                    // Fade out text after 3 seconds for a clean museum view
                    setTimeout(() => {
                        instructions.style.transition = "opacity 1s ease-in-out";
                        instructions.style.opacity = "0";
                    }, 3000);
                    
                }, 50); 
            }
        });
    </script>

</body>
</html>
