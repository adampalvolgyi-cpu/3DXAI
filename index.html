<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3DXAI - Építészeti AR</title>
    
    <!-- Google Model Viewer betöltése -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
    
    <style>
        /* Sötét téma beállítása */
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: #121212;
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
        }

        model-viewer {
            width: 100%;
            height: 100%;
            background-color: #121212;
            --poster-color: transparent;
        }

        /* Egyedi AR gomb - Középre rendezve, iPad és mobil barát */
        #ar-button {
            background-color: #ffffff;
            border-radius: 30px;
            border: none;
            position: absolute;
            bottom: 130px; /* A választó lista felett */
            left: 50%;
            transform: translateX(-50%); /* Ez garantálja a tökéletes középre igazítást */
            padding: 15px 30px;
            font-size: 16px;
            font-weight: bold;
            color: #121212;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            z-index: 1000;
            white-space: nowrap;
        }

        #ar-button:active {
            background-color: #cccccc;
        }

        /* Alsó választó konténer - Középre rögzítve */
        .ui-container {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%); /* Tökéletes középre igazítás */
            width: 85%; /* Szélesség mobilon */
            max-width: 400px; /* iPaden nem lesz túl széles, nem lóg le */
            box-sizing: border-box; /* Megakadályozza a kilógást */
            z-index: 100;
            background: #1e1e1e;
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0px 10px 30px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            gap: 8px;
            border: 1px solid #333;
        }

        .ui-container label {
            font-size: 11px;
            font-weight: bold;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-align: center; /* Szöveg középre */
        }

        .ui-container select {
            padding: 12px;
            font-size: 16px;
            border: 1px solid #444;
            border-radius: 10px;
            background-color: #2d2d2d;
            color: white;
            cursor: pointer;
            outline: none;
            -webkit-appearance: none;
            text-align: center; /* Opciók középre */
        }

        /* AR közben elrejtjük a UI-t */
        model-viewer[ar-status="session-started"] .ui-container,
        model-viewer[ar-status="session-started"] #ar-button {
            display: none;
        }
    </style>
</head>
<body>

    <model-viewer 
        id="ar-viewer"
        ar 
        ar-modes="webxr scene-viewer quick-look" 
        ar-scale="fixed"
        camera-controls 
        shadow-intensity="1"
        exposure="1"
        environment-image="neutral">
        
        <button slot="ar-button" id="ar-button">
            👋 INDÍTÁS AR-BAN
        </button>

    </model-viewer>

    <div class="ui-container">
        <label for="project-selector">3D PROJEKT KIVÁLASZTÁSA</label>
        <select id="project-selector">
            <option value="project1">1. Projekt: Teszt</option>
            <option value="project2">2. Projekt: Második</option>
            <!-- Ide jöhet a többi projekt... -->
        </select>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const viewer = document.getElementById('ar-viewer');
            const selector = document.getElementById('project-selector');

            const urlParams = new URLSearchParams(window.location.search);
            const projectFromUrl = urlParams.get('project');

            function loadModel(projectName) {
                // VISSZATETTÜK A MODELS MAPPÁT AZ ELÉRÉSI ÚTBA!
                // Így már meg fogja találni a .reality fájlt, és elindul az AR.
                const glbPath = 'models/' + projectName + '.glb';
                const realityPath = 'models/' + projectName + '.reality'; 

                viewer.setAttribute('src', glbPath);
                viewer.setAttribute('ios-src', realityPath);
            }

            if (projectFromUrl && document.querySelector(`#project-selector option[value="${projectFromUrl}"]`)) {
                selector.value = projectFromUrl;
                loadModel(projectFromUrl);
            } else {
                loadModel(selector.value);
            }

            selector.addEventListener('change', (event) => {
                loadModel(event.target.value);
                const newUrl = window.location.protocol + "//" + window.location.host + window.location.pathname + '?project=' + event.target.value;
                window.history.pushState({path:newUrl}, '', newUrl);
            });
        });
    </script>

</body>
</html>
