<!-- Version: 1.8 -->
<!-- Changelog:
  - Removed ios-src attribute from <model-viewer> to prevent GitHub Pages MIME-type fetching errors.
  - Added native iOS detection script.
  - Implemented raw HTML Anchor (rel="ar") injection to bypass Safari security blocks for .reality files.
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Digital Art Exhibition AR</title>
  <style>
    body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #111; }
    model-viewer { width: 100%; height: 100%; }

    #ar-button {
      position: absolute; bottom: 100px; left: 50%; transform: translateX(-50%);
      background-color: #fff; color: #000; padding: 15px 30px;
      font-size: 18px; font-weight: bold; border: none; border-radius: 8px;
      cursor: pointer; z-index: 100;
    }

    #project-list {
      position: absolute; bottom: 15px; left: 0; width: 100%; height: 60px;
      display: flex; gap: 10px; overflow-x: auto; padding: 0 20px;
      box-sizing: border-box; z-index: 100; align-items: center;
      -ms-overflow-style: none; scrollbar-width: none;
    }
    #project-list::-webkit-scrollbar { display: none; }

    .project-btn {
      flex-shrink: 0; background-color: rgba(255, 255, 255, 0.2); color: white;
      border: 1px solid #fff; padding: 10px 20px; border-radius: 8px;
      cursor: pointer; font-family: sans-serif; font-size: 14px;
      transition: background-color 0.2s, color 0.2s;
    }
    .project-btn.active { background-color: #fff; color: #000; font-weight: bold; }

    #ar-ui-container {
      display: none; position: absolute; inset: 0; z-index: 1000; pointer-events: none;
    }
    .ar-ui-layer { position: absolute; inset: 0; z-index: 20; pointer-events: none; }

    #instructions {
      position: absolute; top: 30px; width: 100%; text-align: center; color: white;
      font-family: sans-serif; font-size: 16px; line-height: 1.5;
      text-shadow: 1px 1px 4px rgba(0,0,0,0.8); pointer-events: none;
    }

    #ghost-image {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 48vw; max-width: 240px; opacity: 0.25; border: 2px dashed #fff; pointer-events: none;
    }

    #version-display {
      position: absolute; top: 15px; left: 15px; color: rgba(255, 255, 255, 0.5);
      font-family: sans-serif; font-size: 14px; z-index: 9999; pointer-events: none;
    }
  </style>
</head>
<body>

  <!-- Notice: ios-src has been removed. We handle iOS manually via JS now. -->
  <model-viewer
    id="exhibition-viewer"
    src="models/project1.glb"
    bounds="tight"
    ar
    ar-placement="wall"
    ar-scale="fixed"
    camera-controls
    alt="Digital Art 3D Model">

    <div id="version-display">v1.8</div>
    
    <!-- We removed slot="ar-button" so we have total control over the click event -->
    <button id="ar-button">Open in AR</button>

    <div id="ar-ui-container">
      <div id="calibration-state" class="ar-ui-layer">
        <div id="instructions">
          1. Scan the wall until the model appears.<br>
          2. Drag the model to align it with the poster.
        </div>
        <img id="ghost-image" src="anchor.jpg" alt="Ghost Anchor">
      </div>
    </div>
  </model-viewer>

  <div id="project-list"></div>

  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>

  <script>
    const viewer = document.getElementById('exhibition-viewer');
    const arUiContainer = document.getElementById('ar-ui-container');
    const ghostImage = document.getElementById('ghost-image');
    const instructions = document.getElementById('instructions');
    const projectList = document.getElementById('project-list');
    const arButton = document.getElementById('ar-button');
    
    let ghostTimeout;
    let currentProjectIndex = 1; // Track which project is currently selected

    // Detect if the user is on an Apple device (iPhone or iPad)
    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

    // Build the dynamic project menu (20 items)
    for (let i = 1; i <= 20; i++) {
      const btn = document.createElement('button');
      btn.className = 'project-btn';
      btn.innerText = `Project ${i}`;
      
      if (i === 1) btn.classList.add('active');

      btn.addEventListener('click', () => {
        currentProjectIndex = i;
        // Update Android/Web model
        viewer.setAttribute('src', `models/project${i}.glb`);
        
        // Update UI styling
        document.querySelectorAll('.project-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
      });

      projectList.appendChild(btn);
    }

    // Custom AR Button Logic
    arButton.addEventListener('click', () => {
      if (isIOS) {
        // NATIVE iOS BYPASS: Force Safari to open the .reality file directly
        const a = document.createElement('a');
        a.setAttribute('rel', 'ar');
        // Appending #allowsContentScaling=0 forces ARKit to lock the 38cm size
        a.setAttribute('href', `models/project${currentProjectIndex}.reality#allowsContentScaling=0`);
        
        // Apple requires an image inside the anchor tag for Quick Look to trigger reliably
        const img = document.createElement('img');
        a.appendChild(img);
        
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
      } else {
        // ANDROID: Trigger the standard <model-viewer> WebXR experience
        viewer.activateAR();
      }
    });

    // Toggle AR UI visibility based on WebXR session status (Android only)
    viewer.addEventListener('ar-status', (event) => {
      if (event.detail.status === 'not-presenting') {
        arUiContainer.style.display = 'none';
        clearTimeout(ghostTimeout);
      } else if (event.detail.status === 'session-started') {
        arUiContainer.style.display = 'block';
        ghostImage.style.display = 'block';
        instructions.style.display = 'block';
        
        ghostTimeout = setTimeout(() => {
          ghostImage.style.display = 'none';
          instructions.style.display = 'none';
        }, 10000);
      } else if (event.detail.status === 'object-placed') {
        ghostImage.style.display = 'none';
        instructions.style.display = 'none';
        clearTimeout(ghostTimeout);
      }
    });
  </script>
</body>
</html>
