<!-- Version: 1.17 -->
<!-- Changelog:
  - Re-introduced scale-hiding logic (0.0001 during scan, 1.0 during placement) to prevent model clipping before anchor detection.
  - Shrunk ghost image CSS boundaries by an additional 30% to maximize WebXR camera tracking space.
  - Repositioned version credit to the absolute bottom center. Reduced font-size to 10px.
  - Injected logo.png in the top-left corner.
  - Added Hamburger Menu with modal toggling.
  - Implemented Deep Linking (?p=X) using history.replaceState for precise project sharing.
  - Integrated navigator.clipboard (Copy Link) and navigator.share (Native OS Sharing) APIs.
  - Converted the desktop QR popup into a permanent display fixture via CSS Media Queries. Removed desktop AR button.
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>AI_X AR Exhibition</title>
  <style>
    body, html {
      margin: 0; padding: 0; width: 100%; height: 100%;
      overflow: hidden; background-color: #111;
    }

    model-viewer { width: 100%; height: 100%; }

    /* Top Left Logo */
    #logo {
      position: absolute; top: 20px; left: 20px;
      max-height: 40px; z-index: 100; pointer-events: none;
    }

    /* Top Right Hamburger Menu */
    #menu-btn {
      position: absolute; top: 20px; right: 20px;
      background: transparent; border: none; cursor: pointer;
      z-index: 101; fill: white; padding: 5px;
    }

    /* Pop-up Menu Modal */
    #menu-popup {
      display: none; position: absolute; top: 60px; right: 20px;
      background: white; border-radius: 8px; padding: 15px;
      width: 260px; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
      z-index: 1000; font-family: sans-serif; font-size: 13px; color: #333;
    }
    #menu-popup button {
      display: block; width: 100%; padding: 10px; margin-bottom: 8px;
      border: 1px solid #ccc; background: #f9f9f9; border-radius: 6px;
      cursor: pointer; font-weight: bold; font-size: 14px; transition: background 0.2s;
    }
    #menu-popup button:active { background: #e0e0e0; }
    #menu-popup a { color: #0066cc; text-decoration: none; }
    #menu-popup .credits {
      margin-top: 15px; padding-top: 15px; border-top: 1px solid #eee; line-height: 1.5;
    }
    #menu-qr-image {
      display: none; width: 100%; margin-top: 10px; border-radius: 4px;
    }

    #ar-button {
      position: absolute; bottom: 100px; left: 50%;
      transform: translateX(-50%); background-color: #fff;
      color: #000; padding: 15px 30px; font-size: 18px;
      font-weight: bold; border: none; border-radius: 8px;
      cursor: pointer; z-index: 100;
      transition: background-color 0.3s, opacity 0.3s;
    }
    #ar-button.loading { opacity: 0.5; pointer-events: none; }

    #project-list {
      position: absolute; bottom: 25px; left: 0; width: 100%; height: 60px;
      display: flex; gap: 10px; overflow-x: auto; padding: 0 20px;
      box-sizing: border-box; z-index: 100; align-items: center;
      -ms-overflow-style: none; scrollbar-width: none;
    }
    #project-list::-webkit-scrollbar { display: none; }

    .project-btn {
      flex-shrink: 0; background-color: rgba(255, 255, 255, 0.2);
      color: white; border: 1px solid #fff; padding: 10px 20px;
      border-radius: 8px; cursor: pointer; font-family: sans-serif;
      font-size: 14px; transition: background-color 0.2s, color 0.2s;
    }
    .project-btn.active {
      background-color: #fff; color: #000; font-weight: bold;
    }

    #ar-ui-container {
      display: none; position: absolute; inset: 0; z-index: 1000; pointer-events: none;
    }
    .ar-ui-layer { position: absolute; inset: 0; z-index: 20; pointer-events: none; }

    #instructions {
      position: absolute; top: 30px; width: 100%; text-align: center;
      color: white; font-family: sans-serif; font-size: 16px;
      line-height: 1.5; text-shadow: 1px 1px 4px rgba(0,0,0,0.8); pointer-events: none;
    }

    #ghost-image {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 33.6vw; /* Reduced exactly 30% from 48vw */
      max-width: 168px; /* Reduced exactly 30% from 240px */
      opacity: 0.25; border: 2px dashed #fff; pointer-events: none;
    }

    #version-display {
      position: absolute; bottom: 5px; left: 0; width: 100%; text-align: center;
      color: rgba(255, 255, 255, 0.5); font-family: sans-serif; font-size: 10px; 
      z-index: 9999; pointer-events: none;
    }

    #desktop-qr-container { display: none; }

    /* Desktop-Exclusive CSS Constraints */
    @media (hover: hover) and (pointer: fine) {
      #ar-button { display: none !important; }
      #desktop-qr-container {
        display: block; position: absolute; right: 30px; bottom: 100px;
        background: white; padding: 15px; border-radius: 12px;
        text-align: center; z-index: 100; font-family: sans-serif;
        box-shadow: 0 4px 15px rgba(0,0,0,0.5);
      }
      #desktop-qr-container p { margin: 0 0 10px 0; font-weight: bold; font-size: 18px; color: #000; }
      #desktop-qr-image { width: 300px; height: 300px; display: block; }
    }
  </style>
</head>
<body>

  <img id="logo" src="logo.png" alt="AI_X Logo">

  <button id="menu-btn" aria-label="Menu">
    <svg viewBox="0 0 24 24" width="30" height="30">
      <path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/>
    </svg>
  </button>

  <div id="menu-popup">
    <button id="copy-link-btn">Copy Link</button>
    <button id="menu-qr-btn">Show QR Code</button>
    <img id="menu-qr-image" src="" alt="Project QR Code">
    <button id="share-btn">Share</button>
    
    <div class="credits">
      <strong>Ádám Pálvölgyi</strong><br>
      email: <a href="mailto:adampalvolgyi@gmail.com">adampalvolgyi@gmail.com</a><br>
      instagram: <a href="https://instagram.com/adampalvolgyi" target="_blank">@adampalvolgyi</a><br><br>
      
      <strong>Exploratív Építészeti Tanszék</strong><br>
      <a href="https://www.explorativ.bme.hu/" target="_blank">https://www.explorativ.bme.hu/</a><br>
      insta: <a href="https://instagram.com/explorativ_bme" target="_blank">@explorativ_bme</a>
    </div>
  </div>

  <model-viewer
    id="exhibition-viewer"
    bounds="tight"
    ar
    ar-placement="wall"
    ar-scale="fixed"
    camera-controls
    alt="Digital Art 3D Model">

    <div id="version-display">v1.17 | developed by Ádám Pálvölgyi</div>

    <button slot="ar-button" id="ar-button">Open in AR</button>

    <div id="ar-ui-container">
      <div id="calibration-state" class="ar-ui-layer">
        <div id="instructions">
          1. Scan the wall until the model appears.<br>
          2. Drag the model to align it with the poster.
        </div>
        <img id="ghost-image" src="anchor.jpg" alt="Ghost Anchor">
      </div>
    </div>

  </model-viewer>

  <div id="desktop-qr-container">
    <p>View in AR</p>
    <img id="desktop-qr-image" src="" alt="Scan this QR Code with your phone">
  </div>

  <div id="project-list"></div>

  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>

  <script>
    const viewer = document.getElementById('exhibition-viewer');
    const arUiContainer = document.getElementById('ar-ui-container');
    const ghostImage = document.getElementById('ghost-image');
    const instructions = document.getElementById('instructions');
    const projectList = document.getElementById('project-list');
    const arButton = document.getElementById('ar-button');
    const desktopQrImage = document.getElementById('desktop-qr-image');
    
    // Menu DOM Elements
    const menuBtn = document.getElementById('menu-btn');
    const menuPopup = document.getElementById('menu-popup');
    const copyLinkBtn = document.getElementById('copy-link-btn');
    const menuQrBtn = document.getElementById('menu-qr-btn');
    const menuQrImage = document.getElementById('menu-qr-image');
    const shareBtn = document.getElementById('share-btn');

    let ghostTimeout;
    let currentBlobUrl = null;

    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
    const isChromeIOS = isIOS && /CriOS/.test(navigator.userAgent);
    const isDesktop = window.matchMedia("(hover: hover) and (pointer: fine)").matches;

    // Read URL Parameters for Deep Linking
    const urlParams = new URLSearchParams(window.location.search);
    const initialProject = parseInt(urlParams.get('p')) || 1;

    // Toggle Hamburger Menu
    menuBtn.addEventListener('click', () => {
      menuPopup.style.display = (menuPopup.style.display === 'block') ? 'none' : 'block';
    });

    // Copy Link Logic
    copyLinkBtn.addEventListener('click', async () => {
      try {
        await navigator.clipboard.writeText(window.location.href);
        copyLinkBtn.innerText = "Link copied!";
        setTimeout(() => copyLinkBtn.innerText = "Copy Link", 2000);
      } catch (err) {
        console.error('Failed to copy: ', err);
      }
    });

    // Mobile Menu QR Toggle
    menuQrBtn.addEventListener('click', () => {
      if (menuQrImage.style.display === 'block') {
        menuQrImage.style.display = 'none';
        menuQrBtn.innerText = "Show QR Code";
      } else {
        const currentUrl = encodeURIComponent(window.location.href);
        menuQrImage.src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${currentUrl}`;
        menuQrImage.style.display = 'block';
        menuQrBtn.innerText = "Hide QR Code";
      }
    });

    // Native Share API Logic
    shareBtn.addEventListener('click', async () => {
      if (navigator.share) {
        try {
          await navigator.share({
            title: 'AI_X AR Exhibition',
            url: window.location.href
          });
        } catch (err) {
          console.error('Error sharing:', err);
        }
      } else {
        alert("Native sharing is not supported on this browser. Please use Copy Link.");
      }
    });

    // Asynchronous loading function
    async function loadProject(index) {
      // Deep Linking: Update browser URL without reloading
      history.replaceState(null, '', '?p=' + index);

      // Update Desktop QR Code payload automatically
      if (isDesktop) {
        const currentUrl = encodeURIComponent(window.location.href);
        desktopQrImage.src = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${currentUrl}`;
      }

      // Update internal Menu QR if it's currently open
      if (menuQrImage.style.display === 'block') {
        const currentUrl = encodeURIComponent(window.location.href);
        menuQrImage.src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${currentUrl}`;
      }

      viewer.setAttribute('src', `models/project${index}.glb`);

      if (isIOS) {
        if (isChromeIOS) {
          viewer.setAttribute('ios-src', `models/project${index}.reality`);
        } else {
          try {
            arButton.classList.add('loading');
            arButton.innerText = "Loading AR...";

            const response = await fetch(`models/project${index}.reality`);
            const rawBinary = await response.arrayBuffer();
            const forgedBlob = new Blob([rawBinary], { type: 'model/vnd.reality' });

            if (currentBlobUrl) {
              URL.revokeObjectURL(currentBlobUrl);
            }

            currentBlobUrl = URL.createObjectURL(forgedBlob);
            viewer.setAttribute('ios-src', currentBlobUrl);

          } catch (error) {
            console.error(`Failed to fetch project${index}.reality:`, error);
            arButton.innerText = "Error Loading";
          } finally {
            arButton.classList.remove('loading');
            arButton.innerText = "Open in AR";
          }
        }
      }
    }

    // Build the dynamic project menu
    for (let i = 1; i <= 20; i++) {
      const btn = document.createElement('button');
      btn.className = 'project-btn';
      btn.innerText = `Project ${i}`;
      
      btn.addEventListener('click', () => {
        document.querySelectorAll('.project-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        loadProject(i);
      });

      projectList.appendChild(btn);
    }

    // Initialize the selected project on boot
    const targetBtn = projectList.children[initialProject - 1];
    if (targetBtn) targetBtn.classList.add('active');
    loadProject(initialProject);

    // WebXR UI Logic (Android Only)
    viewer.addEventListener('ar-status', (event) => {
      if (event.detail.status === 'not-presenting') {
        arUiContainer.style.display = 'none';
        viewer.setAttribute('scale', '1 1 1'); // Ensure scale resets safely
        clearTimeout(ghostTimeout);
      } else if (event.detail.status === 'session-started') {
        arUiContainer.style.display = 'block';
        ghostImage.style.display = 'block';
        instructions.style.display = 'block';
        
        // Hide model visually during spatial scanning
        viewer.setAttribute('scale', '0.0001 0.0001 0.0001');
        
        ghostTimeout = setTimeout(() => {
          ghostImage.style.display = 'none';
          instructions.style.display = 'none';
        }, 10000);
      } else if (event.detail.status === 'object-placed') {
        ghostImage.style.display = 'none';
        instructions.style.display = 'none';
        
        // Restore scale to display the tracked model
        viewer.setAttribute('scale', '1 1 1');
        clearTimeout(ghostTimeout);
      }
    });
  </script>
</body>
</html>
