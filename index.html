<!-- 
  Version History:
  Version: 1.0 - Initial setup with DOM Overlay, state segregation, and synthetic click hit-testing.
  Version: 1.1 - Removed interaction blocker to re-enable native WebXR touch gestures.
  Version: 1.2 - Added persistent version display element to the DOM.
  Version: 1.3 - Fixed Exit AR pointer blocking, added bounds="tight", implemented 0.0001 scale pre-hiding.
  Version: 1.4 - Fixed premature UI teardown exclusively to 'not-presenting' state.
  Version: 1.5 - Reverted to auto-anchoring, removed manual placement buttons, added auto-hide logic for ghost anchor.
  Version: 1.6 - Shrunk ghost image by 20%, added ios-src attribute for RealityKit fallback.
  Version: 1.7 - Reverted parallax instructions, added dynamic horizontal scroll menu for 20 projects.
  Version: 1.8 - Attempted JS native bypass for iOS MIME types (Failed).
  Version: 1.9 - Attempted dual-button DOM separation for Safari User Gesture rules (Failed).
  Version: 1.10 - Reverted to v1.7. Removed scale hashes. Implemented Absolute URL resolution to fix Safari ARQL pathing bug.
  Version: 1.11 - Removed Absolute URL logic. Implemented Async Fetch & Blob Forgery to manually enforce Apple MIME types.
  Version: 1.12 - Appended developer credit to version. Added interactive GPU-accelerated blurred blob background.
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Digital Art Exhibition AR</title>
  <style>
    body, html {
      margin: 0; padding: 0; width: 100%; height: 100%;
      overflow: hidden; background-color: #050014; /* Deep dark blue background */
    }

    /* Interactive Background Container */
    #bg-container {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      overflow: hidden; z-index: -1; pointer-events: none;
    }

    /* Blob Elements */
    .blob {
      position: absolute; top: 0; left: 0; border-radius: 50%;
      filter: blur(80px); opacity: 0.7; pointer-events: none;
      will-change: transform; /* Hardware acceleration hint */
    }

    #blob1 { width: 60vw; height: 60vw; background: #1a1aff; } /* Blue */
    #blob2 { width: 50vw; height: 50vw; background: #9900ff; } /* Magenta */
    #blob3 { width: 70vw; height: 70vw; background: #26004d; } /* Deep Purple */

    /* Model Viewer */
    model-viewer { 
      width: 100%; height: 100%; 
      background-color: transparent; /* Allows blobs to show through */
    }

    #ar-button {
      position: absolute; bottom: 100px; left: 50%;
      transform: translateX(-50%); background-color: #fff;
      color: #000; padding: 15px 30px; font-size: 18px;
      font-weight: bold; border: none; border-radius: 8px;
      cursor: pointer; z-index: 100;
      transition: background-color 0.3s, opacity 0.3s;
    }
    
    #ar-button.loading {
      opacity: 0.5; pointer-events: none;
    }

    #project-list {
      position: absolute; bottom: 15px; left: 0; width: 100%; height: 60px;
      display: flex; gap: 10px; overflow-x: auto; padding: 0 20px;
      box-sizing: border-box; z-index: 100; align-items: center;
      -ms-overflow-style: none; scrollbar-width: none;
    }
    #project-list::-webkit-scrollbar { display: none; }

    .project-btn {
      flex-shrink: 0; background-color: rgba(255, 255, 255, 0.2);
      color: white; border: 1px solid #fff; padding: 10px 20px;
      border-radius: 8px; cursor: pointer; font-family: sans-serif;
      font-size: 14px; transition: background-color 0.2s, color 0.2s;
    }
    .project-btn.active {
      background-color: #fff; color: #000; font-weight: bold;
    }

    #ar-ui-container {
      display: none; position: absolute; inset: 0; z-index: 1000; pointer-events: none;
    }
    .ar-ui-layer { position: absolute; inset: 0; z-index: 20; pointer-events: none; }

    #instructions {
      position: absolute; top: 30px; width: 100%; text-align: center;
      color: white; font-family: sans-serif; font-size: 16px;
      line-height: 1.5; text-shadow: 1px 1px 4px rgba(0,0,0,0.8); pointer-events: none;
    }

    #ghost-image {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 48vw; max-width: 240px; opacity: 0.25; border: 2px dashed #fff; pointer-events: none;
    }

    #version-display {
      position: absolute; top: 15px; left: 15px; color: rgba(255, 255, 255, 0.5);
      font-family: sans-serif; font-size: 14px; z-index: 9999; pointer-events: none;
    }
  </style>
</head>
<body>

  <!-- Dynamic Animated Background -->
  <div id="bg-container">
    <div id="blob1" class="blob"></div>
    <div id="blob2" class="blob"></div>
    <div id="blob3" class="blob"></div>
  </div>

  <model-viewer
    id="exhibition-viewer"
    bounds="tight"
    ar
    ar-placement="wall"
    ar-scale="fixed"
    camera-controls
    alt="Digital Art 3D Model">

    <div id="version-display">v1.12 | developed by Ádám Pálvölgyi</div>

    <button slot="ar-button" id="ar-button">Open in AR</button>

    <div id="ar-ui-container">
      <div id="calibration-state" class="ar-ui-layer">
        <div id="instructions">
          1. Scan the wall until the model appears.<br>
          2. Drag the model to align it with the poster.
        </div>
        <img id="ghost-image" src="anchor.jpg" alt="Ghost Anchor">
      </div>
    </div>

  </model-viewer>

  <div id="project-list"></div>

  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>

  <script>
    // --- BLOB ANIMATION LOGIC ---
    const blobs =[
      { el: document.getElementById('blob1'), x: 0, y: 0, tx: 0, ty: 0, offset: 0, speed: 0.0008 },
      { el: document.getElementById('blob2'), x: 0, y: 0, tx: 0, ty: 0, offset: 2, speed: 0.0012 },
      { el: document.getElementById('blob3'), x: 0, y: 0, tx: 0, ty: 0, offset: 4, speed: 0.0009 }
    ];

    let pointerX = window.innerWidth / 2;
    let pointerY = window.innerHeight / 2;
    let isDragging = false;

    // Capture pointer events even if <model-viewer> tries to consume them
    window.addEventListener('pointerdown', (e) => { isDragging = true; pointerX = e.clientX; pointerY = e.clientY; }, { capture: true });
    window.addEventListener('pointermove', (e) => { if(isDragging) { pointerX = e.clientX; pointerY = e.clientY; } }, { capture: true });
    window.addEventListener('pointerup', () => { isDragging = false; }, { capture: true });

    function animateBlobs() {
      const time = performance.now();
      
      blobs.forEach(blob => {
        if (!isDragging) {
          // Idle State: Gentle sine wave wandering
          blob.tx = (window.innerWidth / 2) + Math.sin(time * blob.speed + blob.offset) * (window.innerWidth * 0.4);
          blob.ty = (window.innerHeight / 2) + Math.cos(time * blob.speed + blob.offset) * (window.innerHeight * 0.4);
        } else {
          // Interaction State: Slowly attract to finger with slight orbit offset
          blob.tx = pointerX + Math.sin(time * blob.speed) * 150;
          blob.ty = pointerY + Math.cos(time * blob.speed) * 150;
        }

        // Lerp equation: smooths the movement so it never snaps instantly
        blob.x += (blob.tx - blob.x) * 0.015;
        blob.y += (blob.ty - blob.y) * 0.015;

        // Apply via 3D transform for GPU hardware acceleration
        blob.el.style.transform = `translate3d(calc(${blob.x}px - 50%), calc(${blob.y}px - 50%), 0)`;
      });

      requestAnimationFrame(animateBlobs);
    }
    // Start animation loop
    animateBlobs();

    // --- AR & MODEL VIEWER LOGIC ---
    const viewer = document.getElementById('exhibition-viewer');
    const arUiContainer = document.getElementById('ar-ui-container');
    const ghostImage = document.getElementById('ghost-image');
    const instructions = document.getElementById('instructions');
    const projectList = document.getElementById('project-list');
    const arButton = document.getElementById('ar-button');
    
    let ghostTimeout;
    let currentBlobUrl = null;

    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

    async function loadProject(index) {
      viewer.setAttribute('src', `models/project${index}.glb`);

      if (isIOS) {
        try {
          arButton.classList.add('loading');
          arButton.innerText = "Loading AR...";

          const response = await fetch(`models/project${index}.reality`);
          const rawBinary = await response.arrayBuffer();
          const forgedBlob = new Blob([rawBinary], { type: 'model/vnd.reality' });

          if (currentBlobUrl) {
            URL.revokeObjectURL(currentBlobUrl);
          }

          currentBlobUrl = URL.createObjectURL(forgedBlob);
          viewer.setAttribute('ios-src', currentBlobUrl);

        } catch (error) {
          console.error(`Failed to fetch project${index}.reality:`, error);
          arButton.innerText = "Error Loading";
        } finally {
          arButton.classList.remove('loading');
          arButton.innerText = "Open in AR";
        }
      }
    }

    for (let i = 1; i <= 20; i++) {
      const btn = document.createElement('button');
      btn.className = 'project-btn';
      btn.innerText = `Project ${i}`;
      
      btn.addEventListener('click', () => {
        document.querySelectorAll('.project-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        
        loadProject(i);
      });

      projectList.appendChild(btn);
    }

    projectList.children[0].classList.add('active');
    loadProject(1);

    viewer.addEventListener('ar-status', (event) => {
      if (event.detail.status === 'not-presenting') {
        arUiContainer.style.display = 'none';
        clearTimeout(ghostTimeout);
      } else if (event.detail.status === 'session-started') {
        arUiContainer.style.display = 'block';
        ghostImage.style.display = 'block';
        instructions.style.display = 'block';
        
        ghostTimeout = setTimeout(() => {
          ghostImage.style.display = 'none';
          instructions.style.display = 'none';
        }, 10000);
      } else if (event.detail.status === 'object-placed') {
        ghostImage.style.display = 'none';
        instructions.style.display = 'none';
        clearTimeout(ghostTimeout);
      }
    });
  </script>
</body>
</html>
