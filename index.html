<!-- Version: 1.0 -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Digital Art Exhibition AR</title>
  <style>
    /* Reset and ensure full screen */
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #111;
    }

    model-viewer {
      width: 100%;
      height: 100%;
    }

    /* Standard HTML Button to launch AR */
    #ar-button {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      background-color: #fff;
      color: #000;
      padding: 15px 30px;
      font-size: 18px;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      z-index: 100;
    }

    /* Custom AR UI Overlay Container */
    #ar-ui-container {
      display: none; /* Hidden outside of AR */
      position: absolute;
      inset: 0;
      z-index: 1000;
    }

    /* Invisible layer to block default drag/rotate gestures */
    #interaction-blocker {
      position: absolute;
      inset: 0;
      pointer-events: auto; /* Absorbs touch events */
      z-index: 10;
    }

    /* UI Elements sit above the blocker */
    .ar-ui-layer {
      position: absolute;
      inset: 0;
      z-index: 20;
      pointer-events: none; /* Let touches pass through to blocker or buttons */
    }

    /* Calibration State UI */
    #instructions {
      position: absolute;
      top: 30px;
      width: 100%;
      text-align: center;
      color: white;
      font-family: sans-serif;
      font-size: 16px;
      line-height: 1.5;
      text-shadow: 1px 1px 4px rgba(0,0,0,0.8);
    }

    #ghost-image {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 60vw; /* Adjust based on poster aspect ratio */
      max-width: 300px;
      opacity: 0.25;
      border: 2px dashed #fff;
      pointer-events: none;
    }

    #place-button {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      background-color: #28a745;
      color: white;
      padding: 15px 30px;
      font-size: 18px;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      pointer-events: auto; /* Make clickable */
    }

    /* Placed State UI */
    #retry-button {
      position: absolute;
      top: 20px;
      left: 20px;
      background-color: rgba(0, 0, 0, 0.6);
      color: white;
      padding: 10px 15px;
      font-size: 14px;
      border: 1px solid #fff;
      border-radius: 4px;
      pointer-events: auto; /* Make clickable */
    }
  </style>
</head>
<body>

  <!-- 
    ar-placement="wall" forces the hit-test against vertical surfaces.
    ar-scale="fixed" explicitly disables pinch-to-scale behavior.
  -->
  <model-viewer
    id="exhibition-viewer"
    src="models/project1.glb"
    ar
    ar-placement="wall"
    ar-scale="fixed"
    camera-controls
    alt="Digital Art 3D Model">

    <!-- AR Launch Button -->
    <button slot="ar-button" id="ar-button">Open in AR</button>

    <!-- Custom AR DOM Overlay -->
    <div id="ar-ui-container">
      <div id="interaction-blocker"></div>

      <!-- State 1: Calibration -->
      <div id="calibration-state" class="ar-ui-layer">
        <div id="instructions">
          1. Scan the wall.<br>
          2. Aim this ghost image at the real poster.<br>
          3. Tap the green button!
        </div>
        <img id="ghost-image" src="anchor.jpg" alt="Ghost Anchor">
        <button id="place-button">Place the model</button>
      </div>

      <!-- State 2: Model Placed -->
      <div id="placed-state" class="ar-ui-layer" style="display: none;">
        <button id="retry-button">Retry Alignment</button>
      </div>
    </div>

  </model-viewer>

  <!-- Import latest model-viewer -->
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>

  <script>
    const viewer = document.getElementById('exhibition-viewer');
    const arUiContainer = document.getElementById('ar-ui-container');
    const calibrationState = document.getElementById('calibration-state');
    const placedState = document.getElementById('placed-state');
    const placeButton = document.getElementById('place-button');
    const retryButton = document.getElementById('retry-button');
    const blocker = document.getElementById('interaction-blocker');

    // Toggle AR UI visibility based on WebXR session status
    viewer.addEventListener('ar-status', (event) => {
      if (event.detail.status === 'session-started') {
        arUiContainer.style.display = 'block';
      } else {
        arUiContainer.style.display = 'none';
        // Reset state upon exiting AR
        placedState.style.display = 'none';
        calibrationState.style.display = 'block';
        blocker.style.pointerEvents = 'auto';
      }
    });

    placeButton.addEventListener('click', () => {
      // 1. Swap UI states
      calibrationState.style.display = 'none';
      placedState.style.display = 'block';

      // 2. Drop the interaction blocker momentarily to allow placement
      blocker.style.pointerEvents = 'none';

      // 3. Calculate exact center of the screen (where ghost image is)
      const centerX = window.innerWidth / 2;
      const centerY = window.innerHeight / 2;

      // 4. Dispatch synthetic pointer events to trigger <model-viewer> hit-test
      const pointerDown = new PointerEvent('pointerdown', { clientX: centerX, clientY: centerY, bubbles: true });
      const pointerUp = new PointerEvent('pointerup', { clientX: centerX, clientY: centerY, bubbles: true });
      
      viewer.dispatchEvent(pointerDown);
      viewer.dispatchEvent(pointerUp);

      // 5. Restore interaction blocker to freeze the model's position
      // Timeout ensures the event loop processes the placement click first
      setTimeout(() => {
        blocker.style.pointerEvents = 'auto';
      }, 50);
    });

    retryButton.addEventListener('click', () => {
      // Revert UI to allow re-calibration
      placedState.style.display = 'none';
      calibrationState.style.display = 'block';
    });
  </script>
</body>
</html>
